name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub release from the selected branch"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  LIBMPV_WINDOWS_RELEASES_API_URL: https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest
  ARTIFACT_RETENTION_DAYS: "30"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            binary_name: pealayer
            archive_ext: tar.gz
          - platform: windows-x64
            os: windows-latest
            binary_name: pealayer.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install MinGW toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install mingw --no-progress -y
          $mingwBin = 'C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin'
          if (-not (Test-Path $mingwBin)) {
            throw "Could not find MinGW bin directory at $mingwBin"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $mingwBin
          rustup target add x86_64-pc-windows-gnu

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev pkg-config libasound2-dev libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Download latest libmpv from GitHub releases (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $apiUrl = '${{ env.LIBMPV_WINDOWS_RELEASES_API_URL }}'
          $headers = @{
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          if ($env:GITHUB_TOKEN) {
            $headers.Authorization = ('token ' + $env:GITHUB_TOKEN)
          }
          $release = Invoke-RestMethod -Uri $apiUrl -Headers $headers
          $assets = @($release.assets) | Where-Object { $_.name -match '^mpv-dev-x86_64(?:-v3)?-.*\.7z$' }
          if (-not $assets) {
            throw 'Could not find latest x86_64 mpv-dev .7z asset in the GitHub release.'
          }
          $asset = $assets | Where-Object { $_.name -match '^mpv-dev-x86_64-v3-' } | Select-Object -First 1
          if (-not $asset) {
            $asset = $assets | Select-Object -First 1
          }

          $downloadUrl = $asset.browser_download_url
          $archiveName = $asset.name

          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $extractDir = Join-Path $env:RUNNER_TEMP 'libmpv'
          Write-Host "Using libmpv package: $archiveName"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath -UseBasicParsing
          & 7z x $archivePath "-o$extractDir" -y

          $importLib = Get-ChildItem -Path $extractDir -Recurse -File | Where-Object {
            $_.Name -in @('mpv.lib', 'libmpv.dll.a', 'libmpv.a')
          } | Select-Object -First 1
          if (-not $importLib) {
            throw 'No supported libmpv import library was found in the extracted package.'
          }

          $mpvDll = Get-ChildItem -Path $extractDir -Recurse -File | Where-Object {
            $_.Name -in @('mpv-2.dll', 'libmpv-2.dll')
          } | Select-Object -First 1
          if (-not $mpvDll) {
            throw 'Neither mpv-2.dll nor libmpv-2.dll was found in the extracted package.'
          }

          "MPV_IMPORT_LIB_PATH=$($importLib.FullName)" >> $env:GITHUB_ENV
          "MPV_DLL_PATH=$($mpvDll.FullName)" >> $env:GITHUB_ENV
          "RUSTFLAGS=-L native=$($importLib.DirectoryName)" >> $env:GITHUB_ENV

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Windows libmpv package"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Source: $downloadUrl"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Import library: $($importLib.Name)"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Runtime DLL: $($mpvDll.FullName)"

      - name: Build release binary
        if: runner.os != 'Windows'
        run: cargo build --release --locked

      - name: Build release binary (Windows GNU)
        if: runner.os == 'Windows'
        run: cargo build --release --locked --target x86_64-pc-windows-gnu

      - name: Package build output
        id: package
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          BINARY_NAME: ${{ matrix.binary_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          DIST_DIR="dist/${PLATFORM}"
          mkdir -p "${DIST_DIR}"
          binary_path="target/release/${BINARY_NAME}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            binary_path="target/x86_64-pc-windows-gnu/release/${BINARY_NAME}"
          fi
          cp "${binary_path}" "${DIST_DIR}/"
          cp README.md LICENSE "${DIST_DIR}/"

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            dll_source="${MPV_DLL_PATH//\\//}"
            dll_name="$(basename "${dll_source}")"
            cp "${dll_source}" "${DIST_DIR}/${dll_name}"
          fi

          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          ARCHIVE_BASE="pealayer-${PLATFORM}-${SAFE_REF}-${GITHUB_SHA::7}"
          if [[ "${ARCHIVE_EXT}" == "zip" ]]; then
            (cd dist && 7z a "${ARCHIVE_BASE}.zip" "${PLATFORM}")
            ARCHIVE_PATH="dist/${ARCHIVE_BASE}.zip"
          else
            tar -C dist -czf "dist/${ARCHIVE_BASE}.tar.gz" "${PLATFORM}"
            ARCHIVE_PATH="dist/${ARCHIVE_BASE}.tar.gz"
          fi

          echo "archive_path=${ARCHIVE_PATH}" >> "$GITHUB_OUTPUT"
          echo "archive_name=$(basename "${ARCHIVE_PATH}")" >> "$GITHUB_OUTPUT"
          echo "safe_ref=${SAFE_REF}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Summarize build
        shell: pwsh
        run: |
          $archive = "${{ steps.package.outputs.archive_path }}"
          $hash = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $archive).Length

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Build summary (${{ matrix.platform }})"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Ref: \`${{ github.ref }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Commit: \`${{ github.sha }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Archive: \`${{ steps.package.outputs.archive_name }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Size (bytes): $size"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- SHA256: \`$hash\`"

      - name: Upload artifact
        uses: actions/upload-artifact@v8
        with:
          name: ${{ matrix.platform }}-${{ steps.package.outputs.safe_ref }}-${{ steps.package.outputs.short_sha }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets

      - name: Summarize release assets
        run: |
          {
            echo "### Release assets"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Source ref: \`${{ github.ref }}\`"
            echo "- Files:"
            find release-assets -type f -printf '  - `%P`\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=Pealayer ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            safe_ref="${GITHUB_REF_NAME//\//-}"
            echo "tag_name=branch-${safe_ref}" >> "$GITHUB_OUTPUT"
            echo "release_name=Pealayer branch build (${safe_ref})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: |
            release-assets/**/*
