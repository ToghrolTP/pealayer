name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub release from the selected branch"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  LIBMPV_WINDOWS_URL: https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-20260610-git-304426c.7z
  ARTIFACT_RETENTION_DAYS: "30"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            binary_name: pealayer
            archive_ext: tar.gz
          - platform: windows-x64
            os: windows-latest
            binary_name: pealayer.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev pkg-config libasound2-dev libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Download libmpv from GitHub (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $downloadUrl = '${{ env.LIBMPV_WINDOWS_URL }}'
          $archiveName = [System.IO.Path]::GetFileName(([System.Uri]$downloadUrl).AbsolutePath)
          if (-not $archiveName.EndsWith('.7z')) {
            throw 'LIBMPV_WINDOWS_URL must point to a .7z archive.'
          }

          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $extractDir = Join-Path $env:RUNNER_TEMP 'libmpv'
          Write-Host "Using libmpv package: $archiveName"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath -UseBasicParsing
          & 7z x $archivePath "-o$extractDir" -y

          $importLib = Get-ChildItem -Path (Join-Path $extractDir 'lib') -Filter 'mpv.lib' -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $importLib) {
            $importLib = Get-ChildItem -Path $extractDir -Recurse -Filter 'mpv.lib' -File | Select-Object -First 1
          }
          if (-not $importLib) {
            throw 'mpv.lib was not found in the extracted package.'
          }

          $mpvDll = Get-ChildItem -Path $extractDir -Filter 'mpv-2.dll' -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $mpvDll) {
            $mpvDll = Get-ChildItem -Path $extractDir -Recurse -Filter 'mpv-2.dll' -File | Select-Object -First 1
          }
          if (-not $mpvDll) {
            throw 'mpv-2.dll was not found in the extracted package.'
          }

          "MPV_LIB_DIR=$($importLib.DirectoryName)" >> $env:GITHUB_ENV
          "MPV_DLL_PATH=$($mpvDll.FullName)" >> $env:GITHUB_ENV
          if ($env:LIB) {
            "LIB=$($importLib.DirectoryName);$env:LIB" >> $env:GITHUB_ENV
          } else {
            "LIB=$($importLib.DirectoryName)" >> $env:GITHUB_ENV
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Windows libmpv package"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Source: $downloadUrl"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Import library: $($importLib.FullName)"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Runtime DLL: $($mpvDll.FullName)"

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package build output
        id: package
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          BINARY_NAME: ${{ matrix.binary_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          DIST_DIR="dist/${PLATFORM}"
          mkdir -p "${DIST_DIR}"
          cp "target/release/${BINARY_NAME}" "${DIST_DIR}/"
          cp README.md LICENSE "${DIST_DIR}/"

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            dll_source="${MPV_DLL_PATH//\\//}"
            cp "${dll_source}" "${DIST_DIR}/mpv-2.dll"
          fi

          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          ARCHIVE_BASE="pealayer-${PLATFORM}-${SAFE_REF}-${GITHUB_SHA::7}"
          if [[ "${ARCHIVE_EXT}" == "zip" ]]; then
            (cd dist && 7z a "${ARCHIVE_BASE}.zip" "${PLATFORM}")
            ARCHIVE_PATH="dist/${ARCHIVE_BASE}.zip"
          else
            tar -C dist -czf "dist/${ARCHIVE_BASE}.tar.gz" "${PLATFORM}"
            ARCHIVE_PATH="dist/${ARCHIVE_BASE}.tar.gz"
          fi

          echo "archive_path=${ARCHIVE_PATH}" >> "$GITHUB_OUTPUT"
          echo "archive_name=$(basename "${ARCHIVE_PATH}")" >> "$GITHUB_OUTPUT"
          echo "safe_ref=${SAFE_REF}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Summarize build
        shell: pwsh
        run: |
          $archive = "${{ steps.package.outputs.archive_path }}"
          $hash = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $archive).Length

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Build summary (${{ matrix.platform }})"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Ref: \`${{ github.ref }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Commit: \`${{ github.sha }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Archive: \`${{ steps.package.outputs.archive_name }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Size (bytes): $size"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- SHA256: \`$hash\`"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ steps.package.outputs.safe_ref }}-${{ steps.package.outputs.short_sha }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Summarize release assets
        run: |
          {
            echo "### Release assets"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Source ref: \`${{ github.ref }}\`"
            echo "- Files:"
            find release-assets -type f -printf '  - `%P`\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=Pealayer ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            safe_ref="${GITHUB_REF_NAME//\//-}"
            echo "tag_name=branch-${safe_ref}" >> "$GITHUB_OUTPUT"
            echo "release_name=Pealayer branch build (${safe_ref})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: |
            release-assets/**/*
